[tools]
python = "3.12"
node = "22"

[tasks.setup]
description = "Install npm dependencies (topojson CLI tools, mapshaper)"
run = "npm install -g topojson-server topojson-simplify topojson-client mapshaper"

[tasks.fetch-data]
description = "Run all ETL fetchers (MARS, DAWA, MiljøGIS, DST, VanDa) + build dashboard data"
run = "bash etl/fetch_all.sh"

[tasks.build-dashboard]
description = "Build the slim dashboard JSON from raw MARS data"
run = "cd etl && python3 build_dashboard_data.py"

[tasks.prepare-map]
description = "Convert GeoJSON to TopoJSON for the frontend map"
run = "bash etl/prepare_map_data.sh"

[tasks.build-kommune-map]
description = "Convert kommune GeoJSON to WGS84 TopoJSON for the choropleth map"
run = "cd etl && python3 build_kommune_topojson.py"

[tasks.all]
description = "Full pipeline: fetch data → prepare map → build dashboard data"
run = """
echo "=== Step 1/3: Fetch all data ==="
bash etl/fetch_all.sh
echo
echo "=== Step 2/3: Prepare map TopoJSON ==="
bash etl/prepare_map_data.sh
echo
echo "=== Step 3/3: Build dashboard data ==="
cd etl && python3 build_dashboard_data.py
echo
echo "=== All done ==="
"""

[tasks.fetch-geometries]
description = "Fetch project geometries from MARS API (resumable — saves every 25 fetches)"
run = "cd etl && python3 fetch_geometries.py"

[tasks.dev]
description = "Start the Vite dev server"
run = "npm run dev"
