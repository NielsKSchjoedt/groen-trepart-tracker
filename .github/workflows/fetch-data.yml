name: Fetch Tracker Data

on:
  schedule:
    # Run daily at 06:00 UTC (08:00 Danish time)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # Persist the DAWA reverse-geocoding cache across runs.
      # Without this, build_dashboard_data.py re-geocodes all ~6500 project
      # geometries via DAWA on every run (~38 min). The cache is keyed by run
      # so the latest entry is always restored via the restore-keys fallback.
      - name: Restore geocoding cache
        uses: actions/cache@v4
        with:
          path: data/geo-kommune-cache.json
          key: geo-kommune-cache-v1-${{ github.run_id }}
          restore-keys: |
            geo-kommune-cache-v1-

      # ETL scripts must run from the etl/ directory so `from etl_log import ...` works
      - name: Fetch MARS data
        run: python3 fetch_mars.py
        working-directory: etl

      - name: Fetch DAWA data
        run: python3 fetch_dawa.py
        working-directory: etl

      - name: Fetch MiljøGIS WFS data
        run: python3 fetch_miljoegis.py
        working-directory: etl

      - name: Fetch Danmarks Statistik data
        run: python3 fetch_dst.py
        working-directory: etl

      - name: Fetch VanDa station data
        run: python3 fetch_vanda.py
        working-directory: etl

      - name: Fetch Klimaregnskab CO₂ data
        run: python3 fetch_klimaregnskab.py
        working-directory: etl
        env:
          KLIMAREGNSKAB_API_KEY: ${{ secrets.KLIMAREGNSKAB_API_KEY }}

      - name: Build dashboard data
        run: python3 build_dashboard_data.py
        working-directory: etl

      - name: Build Klimaregnskab per-kommune data
        run: python3 build_klimaregnskab_data.py
        working-directory: etl

      - name: Build ETL run summary
        run: python3 build_etl_summary.py
        working-directory: etl

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated data
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "Trepart Tracker Bot"
          git config user.email "bot@trepart-tracker.dk"
          git add data/ public/data/
          DATE=$(date -u '+%Y-%m-%d')
          git commit -m "data: update tracker data ($DATE)"

          # Push to a short-lived branch and auto-merge so the direct-push
          # branch protection rule on main is not violated.
          BRANCH="bot/data-update-$DATE-${{ github.run_number }}"
          git push origin HEAD:"$BRANCH"
          gh pr create \
            --title "data: update tracker data ($DATE)" \
            --body "Automated daily data refresh from GitHub Actions (run #${{ github.run_number }})." \
            --base main \
            --head "$BRANCH"
          gh pr merge "$BRANCH" --squash --auto --delete-branch
