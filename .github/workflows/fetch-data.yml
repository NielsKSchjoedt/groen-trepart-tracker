name: Fetch Tracker Data

on:
  schedule:
    # Run daily at 06:00 UTC (08:00 Danish time)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  # ETL runs in its own job so the workflow can finish successfully and **save
  # Actions caches** even when the follow-up commit/merge job fails. GitHub only
  # persists cache entries when the job that used `actions/cache` completes
  # successfully; a failed `gh pr merge` in the same job used to prevent saves,
  # so every run stayed cold (~38 min geocoding + ~20–38 min geometries).
  etl:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    outputs:
      changed: ${{ steps.changes.outputs.changed }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install openpyxl

      # Persist the DAWA reverse-geocoding cache across runs.
      # Without this, build_dashboard_data.py re-geocodes all ~6500 project
      # geometries via DAWA on every run (~38 min). The cache is keyed by run
      # so the latest entry is always restored via the restore-keys fallback.
      - name: Restore geocoding cache
        uses: actions/cache@v5
        with:
          path: data/geo-kommune-cache.json
          key: geo-kommune-cache-v1-${{ github.run_id }}
          restore-keys: |
            geo-kommune-cache-v1-

      # Persist the MARS WKT geometry cache across runs.
      # Without this, fetch_geometries.py re-fetches all ~6500 individual
      # geometry API calls on every run (~20-38 min). With the cache, only
      # newly added MARS projects are fetched (typically 0-50 per day).
      - name: Restore MARS geometry cache
        uses: actions/cache@v5
        with:
          path: data/mars/geometries-wkt.json
          key: geometries-wkt-v1-${{ github.run_id }}
          restore-keys: |
            geometries-wkt-v1-

      # Klimaregnskab: 588 serial API calls (~7 min). Cache the raw output
      # and only re-fetch when a new data year becomes available (probed with
      # a single API call).
      - name: Restore Klimaregnskab raw data
        uses: actions/cache@v5
        with:
          path: data/klimaregnskab/noegletal_raw.json
          key: klimaregnskab-raw-v1-${{ github.run_id }}
          restore-keys: |
            klimaregnskab-raw-v1-

      # Klimaskovfonden + Naturstyrelsen: DAWA reverse-geocoding caches.
      # Coordinates that have already been geocoded are reused — only new
      # projects trigger API calls.
      - name: Restore Klimaskovfonden geocode cache
        uses: actions/cache@v5
        with:
          path: data/klimaskovfonden/geocode-cache.json
          key: klimaskov-geocode-v1-${{ github.run_id }}
          restore-keys: |
            klimaskov-geocode-v1-

      - name: Restore Naturstyrelsen geocode cache
        uses: actions/cache@v5
        with:
          path: data/naturstyrelsen-skov/geocode-cache.json
          key: naturstyrelsen-geocode-v1-${{ github.run_id }}
          restore-keys: |
            naturstyrelsen-geocode-v1-

      # §3 protected areas: skip 186K-feature WFS pagination when the total
      # feature count is unchanged since last run.
      - name: Restore §3 summary (for count-based skip)
        uses: actions/cache@v5
        with:
          path: |
            data/section3/summary.json
            data/section3/by_kommune.json
          key: section3-summary-v1-${{ github.run_id }}
          restore-keys: |
            section3-summary-v1-

      # DAWA municipality boundaries: essentially static data, re-fetched
      # only when files are older than 30 days.
      - name: Restore DAWA data
        uses: actions/cache@v5
        with:
          path: |
            data/dawa/kommuner.json
            data/dawa/kommuner.geojson
            data/dawa/regioner.json
          key: dawa-data-v1-${{ github.run_id }}
          restore-keys: |
            dawa-data-v1-

      # ETL scripts must run from the etl/ directory so `from etl_log import ...` works
      - name: Fetch MARS data
        run: python3 fetch_mars.py
        working-directory: etl

      - name: Fetch DAWA data
        run: python3 fetch_dawa.py
        working-directory: etl

      - name: Fetch MiljøGIS WFS data
        run: python3 fetch_miljoegis.py
        working-directory: etl

      # Fetch project map polygons from MARS API.
      # Only newly added projects are fetched (delta vs WKT cache above).
      - name: Fetch MARS project geometries
        run: python3 fetch_geometries.py
        working-directory: etl

      - name: Fetch Natura 2000 protected areas
        run: python3 fetch_natura2000.py
        working-directory: etl

      - name: Fetch Klimaskovfonden afforestation projects
        run: python3 fetch_klimaskovfonden.py
        working-directory: etl

      - name: Fetch Naturstyrelsen state forest projects
        run: python3 fetch_naturstyrelsen_skov.py
        working-directory: etl

      - name: Fetch §3 protected nature areas
        run: python3 fetch_section3.py
        working-directory: etl

      - name: Fetch forest data (fredskov + skovkort)
        run: python3 fetch_fredskov.py
        working-directory: etl

      - name: Fetch KF25 climate data (KEFM)
        run: python3 fetch_kf25.py
        working-directory: etl

      - name: Fetch Danmarks Statistik data
        run: python3 fetch_dst.py
        working-directory: etl

      - name: Fetch VanDa station data
        run: python3 fetch_vanda.py
        working-directory: etl

      - name: Fetch Klimaregnskab CO₂ data
        run: python3 fetch_klimaregnskab.py
        working-directory: etl
        env:
          KLIMAREGNSKAB_API_KEY: ${{ secrets.KLIMAREGNSKAB_API_KEY }}

      - name: Build dashboard data
        run: python3 build_dashboard_data.py
        working-directory: etl

      - name: Build CO₂ emissions data
        run: python3 build_co2_data.py
        working-directory: etl

      - name: Build Klimaregnskab per-kommune data
        run: python3 build_klimaregnskab_data.py
        working-directory: etl

      - name: Build ETL run summary
        run: python3 build_etl_summary.py
        working-directory: etl

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/ public/data/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Upload built data for commit job
        if: steps.changes.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tracker-data
          path: |
            data
            public/data

  commit:
    needs: etl
    if: needs.etl.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: tracker-data
          path: .

      - name: Commit and push branch
        run: |
          git config user.name "Trepart Tracker Bot"
          git config user.email "bot@trepart-tracker.dk"
          git add data/ public/data/
          DATE=$(date -u '+%Y-%m-%d')
          git commit -m "data: update tracker data ($DATE)"

          BRANCH="bot/data-update-$DATE-${{ github.run_number }}"
          git push origin HEAD:"$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          echo "DATE=$DATE" >> $GITHUB_ENV

      # PR creation uses a PAT so the pull_request event triggers CI.
      # Events from GITHUB_TOKEN don't trigger other workflows.
      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.AUTO_APPROVE_PAT }}
        run: |
          gh pr create \
            --title "data: update tracker data ($DATE)" \
            --body "Automated daily data refresh from GitHub Actions (run #${{ github.run_number }})." \
            --base main \
            --head "$BRANCH"

      # Approve with GITHUB_TOKEN (github-actions[bot]) — this is a different
      # identity from the PR author (the PAT owner), so it counts as a valid
      # review. Requires Settings → Actions → General → "Allow GitHub Actions
      # to create and approve pull requests" to be enabled.
      - name: Approve PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr review "$BRANCH" --approve

      # Enable auto-merge with GITHUB_TOKEN — the PAT lacks the
      # enablePullRequestAutoMerge permission (requires Contents: Write,
      # but we intentionally keep the PAT scoped to read-only).
      # Auto-merge waits for CI to pass before merging.
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge "$BRANCH" --squash --auto --delete-branch
