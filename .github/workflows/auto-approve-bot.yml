name: Auto-approve bot data PRs

# Triggered by pull_request_target so it runs even for branches that
# don't contain this workflow file (the bot's data-only branches).
on:
  pull_request_target:
    branches: [main]

jobs:
  approve:
    # Only approve automated data-update PRs (created by the fetch-data workflow).
    if: startsWith(github.head_ref, 'bot/data-update-')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Approve PR
        env:
          # A fine-grained PAT is needed because GITHUB_TOKEN approvals
          # from github-actions[bot] don't count (same actor as the PR
          # author — GitHub ignores self-approvals).
          GH_TOKEN: ${{ secrets.AUTO_APPROVE_PAT }}
        run: gh pr review "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --approve --body "Auto-approved: bot data update PR with CI checks passing."
